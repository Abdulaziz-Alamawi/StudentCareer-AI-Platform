services:
  db:
    image: postgres:16-alpine
    container_name: studentcareer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: studentcareer
      POSTGRES_PASSWORD: studentcareer
      POSTGRES_DB: studentcareer
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studentcareer"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: studentcareer-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://studentcareer:studentcareer@db:5432/studentcareer
      SECRET_KEY: super-secret-change-me-in-production
      BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: studentcareer-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  db_data:
